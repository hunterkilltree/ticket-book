spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: event-service
          uri: ${EVENT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/events/**
        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/search/**
        - id: booking-service
          uri: ${BOOKING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/bookings/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/payments/**
        - id: ticket-service
          uri: ${TICKET_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/tickets/**
        - id: admin-service
          uri: ${ADMIN_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/admin/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

server:
  port: 8080
