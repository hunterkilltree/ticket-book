spring:
  application:
    name: search-service
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

server:
  port: 8083
