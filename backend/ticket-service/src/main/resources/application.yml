spring:
  application:
    name: ticket-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

server:
  port: 8087
