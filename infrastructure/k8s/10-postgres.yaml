# Single Postgres instance hosting one logical DB per service.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ticketing
data:
  init.sql: |
    CREATE DATABASE userdb;
    CREATE DATABASE eventdb;
    CREATE DATABASE bookingdb;
    CREATE DATABASE orderdb;
    CREATE DATABASE paymentdb;
    CREATE DATABASE ticketdb;
    CREATE DATABASE admindb;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ticketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ticketing
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
