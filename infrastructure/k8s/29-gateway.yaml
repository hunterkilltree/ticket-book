apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ticketing
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ticketbooking/gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: EVENT_SERVICE_URL
              value: "http://event-service:8082"
            - name: SEARCH_SERVICE_URL
              value: "http://search-service:8083"
            - name: BOOKING_SERVICE_URL
              value: "http://booking-service:8084"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8085"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8086"
            - name: TICKET_SERVICE_URL
              value: "http://ticket-service:8087"
            - name: ADMIN_SERVICE_URL
              value: "http://admin-service:8089"
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              memory: "768Mi"
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: ticketing
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
