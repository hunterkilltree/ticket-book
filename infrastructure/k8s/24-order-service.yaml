apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: ticketing
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ticketbooking/order-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: ticket-config
            - secretRef:
                name: ticket-secret
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres:5432/orderdb"
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              memory: "768Mi"
          startupProbe:
            tcpSocket:
              port: 8085
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 8085
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8085
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: ticketing
spec:
  selector:
    app: order-service
  ports:
    - port: 8085
      targetPort: 8085
