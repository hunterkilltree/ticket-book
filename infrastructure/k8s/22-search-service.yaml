apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: ticketing
  labels:
    app: search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
        - name: search-service
          image: ticketbooking/search-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: ticket-config
            - secretRef:
                name: ticket-secret
          resources:
            requests:
              cpu: "100m"
              memory: "384Mi"
            limits:
              memory: "768Mi"
          startupProbe:
            tcpSocket:
              port: 8083
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 8083
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8083
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: ticketing
spec:
  selector:
    app: search-service
  ports:
    - port: 8083
      targetPort: 8083
