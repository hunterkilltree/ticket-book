# Replace with the keys from your (separate) frontend SonarCloud project.
sonar.organization=REPLACE_ME_organization
sonar.projectKey=REPLACE_ME_frontend-project-key

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.css
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Fail the CI job if the project's quality gate fails (lets it be a required status check).
sonar.qualitygate.wait=true
